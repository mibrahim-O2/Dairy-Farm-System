<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#1f3a5f;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.error{
color:red;
font-size:13px;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

{% if error %}

<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button>Login</button>

</form>

</div>

</body>
</html>
