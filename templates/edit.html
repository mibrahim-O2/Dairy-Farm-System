<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Edit Voucher</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.container{
width:700px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#1a7f37;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:20px;
padding:10px 15px;
background:#1a7f37;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#155d27;
}

.back{
margin-top:15px;
display:inline-block;
text-decoration:none;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<h1>Edit Voucher</h1>

<form method="POST" action="/update/{{data.id}}">

<label>Name</label> <input type="text" name="name" value="{{data.name}}" required>

<label>Date</label> <input type="date" name="date" value="{{data.date}}" required>

<label>Total Days</label> <input type="number" name="days" value="{{data.days}}" required>

<label>Rate per KG</label> <input type="number" name="rate" step="0.01" value="{{data.rate}}" required>

<label>Daily Milk</label> <input type="number" name="daily" step="0.01" value="{{data.daily}}" required>

<label>Extra Milk</label> <input type="number" name="extra" step="0.01" value="{{data.extra}}" required>

<label>Milk Used</label> <input type="number" name="used" step="0.01" value="{{data.used}}" required>

<label>Previous Due</label> <input type="number" name="due" step="0.01" value="{{data.due}}" required>

<button type="submit">
Update Voucher
</button>

</form>

<a class="back" href="/">⬅ Back to Dashboard</a>

</div>

</body>
</html>
